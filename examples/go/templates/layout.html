{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authon Go SDK Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0:       #070b16;
      --bg-1:       #0d1424;
      --bg-card:    #111827;
      --border:     rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.05);
      --text-primary:   #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary:  #64748b;
      --accent:     #7c3aed;
      --accent-2:   #4f46e5;
      --accent-light: rgba(124,58,237,0.12);
      --success:    #22c55e;
      --success-bg: rgba(34,197,94,0.1);
      --danger:     #ef4444;
      --danger-bg:  rgba(239,68,68,0.1);
      --warning:    #f59e0b;
      --warning-bg: rgba(245,158,11,0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-0);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      height: 64px;
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: 800;
    }
    .nav-logo-text {
      font-weight: 700; font-size: 16px; color: var(--text-primary);
    }
    .nav-logo-text span { color: var(--accent); margin-left: 4px; font-size: 13px; font-weight: 500; }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); text-decoration: none; transition: color 0.15s;
    }
    .nav-link:hover { color: var(--text-primary); }
    .btn-nav-signin {
      padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); text-decoration: none;
      border: 1px solid var(--border); transition: all 0.15s;
    }
    .btn-nav-signin:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
    .btn-nav-signup {
      padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      color: #fff; text-decoration: none;
      background: var(--accent); transition: background 0.15s;
    }
    .btn-nav-signup:hover { background: #6d28d9; }

    .avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-lg {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .avatar-lg img { width: 100%; height: 100%; object-fit: cover; }

    main { flex: 1; display: flex; flex-direction: column; }

    .page { max-width: 1100px; margin: 0 auto; width: 100%; padding: 40px 24px; }
    .page-centered {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .page-centered > div { width: 100%; max-width: 480px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .section-title {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 16px;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 9px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; text-decoration: none; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-secondary {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
    .form-input {
      width: 100%; padding: 10px 14px;
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; color: var(--text-primary);
      outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-hint { font-size: 12px; color: var(--text-tertiary); }

    .alert {
      padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.5;
    }
    .alert-error { background: var(--danger-bg); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .alert-success { background: var(--success-bg); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
    .alert-warning { background: var(--warning-bg); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 99px; font-size: 12px; font-weight: 600;
    }
    .badge-success { background: var(--success-bg); color: var(--success); }
    .badge-muted { background: rgba(100,116,139,0.1); color: var(--text-tertiary); }
    .badge-accent { background: var(--accent-light); color: var(--accent); }

    .divider { height: 1px; background: var(--border); }

    .social-grid { display: flex; flex-direction: column; gap: 8px; }
    .social-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-1);
      color: var(--text-primary); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .social-btn:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
    .social-btn-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }

    .session-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
      display: flex; align-items: center; gap: 12; justify-content: space-between;
    }

    .backup-codes-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    }
    .backup-code {
      background: var(--bg-0); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px;
      font-family: 'Courier New', monospace; font-size: 13px;
      color: var(--text-primary); text-align: center; letter-spacing: 0.05em;
    }

    .feature-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px;
    }
    .feature-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
    }
    .feature-icon { font-size: 24px; margin-bottom: 10px; }
    .feature-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .feature-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    .info-row { display: flex; gap: 8px; align-items: baseline; }
    .info-label { font-size: 13px; color: var(--text-tertiary); min-width: 80px; flex-shrink: 0; }
    .info-value { font-size: 13px; color: var(--text-secondary); word-break: break-all; }
    .info-value-mono { font-family: 'Courier New', monospace; }

    footer {
      border-top: 1px solid var(--border-subtle);
      padding: 20px 24px; text-align: center;
      color: var(--text-tertiary); font-size: 13px;
    }
    footer a { color: var(--text-tertiary); text-decoration: underline; }
    footer a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <div class="nav-logo-icon">A</div>
        <span class="nav-logo-text">Authon<span>Go SDK</span></span>
      </a>
      <div class="nav-links">
        {{if .User}}
          <a href="/profile" class="nav-link">Profile</a>
          <a href="/mfa" class="nav-link">MFA</a>
          <a href="/sessions" class="nav-link">Sessions</a>
          <div style="display:flex;align-items:center;gap:8px;margin-left:8px;">
            <div class="avatar-sm">
              {{if .User.AvatarURL}}
                <img src="{{.User.AvatarURL}}" alt="avatar" />
              {{else}}
                {{initials .User}}
              {{end}}
            </div>
            <form action="/sign-out" method="POST" style="margin:0;">
              <button type="submit" class="btn btn-sm btn-secondary">Sign out</button>
            </form>
          </div>
        {{else}}
          <a href="/sign-in" class="btn-nav-signin">Sign in</a>
          <a href="/sign-up" class="btn-nav-signup">Sign up</a>
        {{end}}
      </div>
    </div>
  </nav>

  <main>
    {{block "content" .}}{{end}}
  </main>

  <footer>
    <div style="max-width:1100px;margin:0 auto;">
      Authon Go SDK Example &mdash;
      <a href="https://docs.authon.dev" target="_blank" rel="noopener noreferrer">Documentation</a>
      &middot;
      <a href="https://github.com/mikusnuz/authon-sdk" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
  </footer>

  <script>
    window.AUTHON_PUBLISHABLE_KEY = "{{.PublishableKey}}";
  </script>
  <script src="/static/authon.js"></script>
</body>
</html>
{{end}}
