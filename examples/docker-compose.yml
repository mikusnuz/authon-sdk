services:
  portal:
    build:
      context: ..
      dockerfile: examples/portal/Dockerfile
    ports:
      - "15585:80"
    restart: unless-stopped

  react:
    build:
      context: ..
      dockerfile: examples/react/Dockerfile
      args:
        VITE_AUTHON_PROJECT_ID: ${VITE_AUTHON_PROJECT_ID}
        VITE_AUTHON_API_URL: ${VITE_AUTHON_API_URL}
    ports:
      - "15586:80"
    restart: unless-stopped

  nextjs:
    build:
      context: ..
      dockerfile: examples/nextjs/Dockerfile
      args:
        NEXT_PUBLIC_AUTHON_PROJECT_ID: ${NEXT_PUBLIC_AUTHON_PROJECT_ID}
        NEXT_PUBLIC_AUTHON_API_URL: ${NEXT_PUBLIC_AUTHON_API_URL}
    ports:
      - "15587:3000"
    env_file: .env
    restart: unless-stopped

  vue:
    build:
      context: ..
      dockerfile: examples/vue/Dockerfile
      args:
        VITE_AUTHON_PROJECT_ID: ${VITE_AUTHON_PROJECT_ID}
        VITE_AUTHON_API_URL: ${VITE_AUTHON_API_URL}
    ports:
      - "15588:80"
    restart: unless-stopped

  nuxt:
    build:
      context: ..
      dockerfile: examples/nuxt/Dockerfile
    ports:
      - "15589:3000"
    env_file: .env
    restart: unless-stopped

  angular:
    build:
      context: ..
      dockerfile: examples/angular/Dockerfile
      args:
        AUTHON_PROJECT_ID: ${AUTHON_PROJECT_ID}
        AUTHON_API_URL: ${AUTHON_API_URL}
    ports:
      - "15595:80"
    restart: unless-stopped

  svelte:
    build:
      context: ..
      dockerfile: examples/svelte/Dockerfile
    ports:
      - "15596:3000"
    env_file: .env
    environment:
      - ORIGIN=${SVELTE_ORIGIN:-http://192.168.0.200:15596}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    restart: unless-stopped

  vanilla-js:
    build:
      context: ..
      dockerfile: examples/vanilla-js/Dockerfile
      args:
        VITE_AUTHON_PROJECT_ID: ${VITE_AUTHON_PROJECT_ID}
        VITE_AUTHON_API_URL: ${VITE_AUTHON_API_URL}
    ports:
      - "15597:80"
    restart: unless-stopped
